<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <main class="auth-container">
        
        <section class="panel-welcome">
            <h1>Bem-vindo de volta!</h1>
            <p>Já possui uma conta? Faça login para continuar.</p>
            <a href="entrar.html" class="btn btn-secondary">ENTRAR</a>
        </section>

        <section class="panel-form">
            <h1>Crie sua conta</h1>
            
            <form class="form" id="register-form">
                
                <div id="error-message" class="error-message"></div>

                <div class="form-group">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-input" placeholder="Nome">
                    <i class="fas fa-user form-input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">email</label>
                    <input type="text" id="email" class="form-input" placeholder="E-mail">
                    <i class="fas fa-envelope form-input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-input" placeholder="Senha">
                    <i class="fas fa-lock form-input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="CPF" class="form-label">CPF</label>
                    <input type="text" id="CPF" class="form-input" placeholder="CPF">
                    <i class="fas fa-id-card form-input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="Data_nascimento" class="form-label">Data_nascimento</label>
                    <input type="date" id="Data_nascimento" class="form-input" placeholder="Data_nascimento">
                    <i class="fas fa-calendar-days form-input-icon"></i>
                </div>

                <a href="entrar.html">
                <button type="submit" class="btn btn-primary" onclick="cadastrar()">CADASTRAR</button>
                </a>
            </form>

        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
