<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anuncie seu Imóvel - Imobiliária John Leitão</title>
  <link rel="stylesheet" href="anuncio.css">
</head>
<body>

<header>
    <img src="img/logo.png" alt="Imobiliária John Leitão">

    <nav>
        <a href="comprar.html" class="meu-botao">Comprar</a>
        <a href="alugar.html" class="meu-botao">Alugar</a>
        <a href="anunciar.html" class="meu-botao">Anuncie seu imóvel</a>
        <a href="sobre.html" class="meu-botao">Sobre</a>
        <a href="contato.html" class="meu-botao">Contato</a>
        <a href="login.html" class="meu-botao conta">Faça login</a>
        <a href="cadastro.html" class="meu-botao conta">Cadastre-se</a>
    </nav>
</header>

  <main class="main-content">

    <div class="form-container">
      <h1>Anuncie seu Imóvel</h1>

      <form action="" method="post" enctype="multipart/form-data">
        <div class="form-grid">

          <div class="form-group">
            <label for="tipo">Tipo de imóvel</label>
            <select name="tipo" id="tipo" required>
              <option value="">Selecione...</option>
              <option value="apartamento">Apartamento</option>
              <option value="casa">Casa</option>
              <option value="sobrado">Sobrado</option>
              <option value="terreno">Terreno</option>
              <option value="comercial">Comercial</option>
              <option value="outro">Outro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="finalidade">Finalidade</label>
            <select name="finalidade" id="finalidade" required>
              <option value="">Selecione...</option>
              <option value="venda">Venda</option>
              <option value="locacao">Locação</option>
            </select>
          </div>

          <div class="form-group">
            <label for="valor">Valor (R$)</label>
            <input type="text" name="valor" id="valor" placeholder="Ex: 450000 ou 1800" required>
          </div>

          <div class="form-group">
            <label for="cidade">Cidade</label>
            <input type="text" name="cidade" id="cidade" value="Curitiba" required>
          </div>

          <div class="form-group">
            <label for="bairro">Bairro</label>
            <input type="text" name="bairro" id="bairro" placeholder="Ex: Batel, Centro, Água Verde" required>
          </div>

          <div class="form-group">
            <label for="quartos">Quartos</label>
            <input type="number" name="quartos" id="quartos" min="0" placeholder="0 para studio">
          </div>

          <div class="form-group full">
            <label for="descricao">Descrição do imóvel</label>
            <textarea name="descricao" id="descricao" rows="5" placeholder="Destaques do imóvel, diferenciais, proximidade a comércios, transporte, etc..." required></textarea>
          </div>

          <div class="form-group full">
            <label for="fotos">Fotos do imóvel (selecione várias)</label>
            <input type="file" name="fotos[]" id="fotos" accept="image/*" multiple>
          </div>

          <div class="form-group">
            <label for="nome">Seu nome</label>
            <input type="text" name="nome" id="nome" required>
          </div>

          <div class="form-group">
            <label for="whatsapp">WhatsApp (com DDD)</label>
            <input type="tel" name="whatsapp" id="whatsapp" placeholder="41 99999-9999" required>
          </div>

          <div class="form-group full">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="seuemail@exemplo.com">
          </div>

          <button type="submit" class="btn-submit">Enviar Anúncio para Análise</button>

          <div class="note">
            Enviaremos uma mensagem de confirmação em até 24h. Fotos nítidas e bem iluminadas ajudam bastante na aprovação!
          </div>

        </div>
      </form>
    </div>

  </main>

  <footer>
    © Imobiliária John Leitão. Todos os direitos reservados 2026.<br>
    Se precisar de ajuda <a href="#">CLIQUE AQUI</a>
  </footer>

</body>
</html>
